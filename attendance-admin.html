<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance Admin Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
/* (UNCHANGED CSS — KEEPING YOUR DESIGN CLEAN) */

*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',sans-serif;background:#eef4ff;color:#111827;}
.dashboard{display:flex;min-height:100vh;}
.sidebar{width:260px;background:#0a1b45;color:white;padding:25px;}
.sidebar h2{margin-bottom:35px;font-size:24px;}
.sidebar ul{list-style:none;}
.sidebar ul li{padding:15px;border-radius:12px;margin-bottom:12px;background:rgba(255,255,255,0.08);cursor:pointer;}
.main-content{flex:1;padding:20px;}
.topbar{background:white;padding:20px;border-radius:20px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 5px 20px rgba(0,0,0,0.05);}
.button{height:55px;border:none;border-radius:14px;background:#0a66ff;color:white;padding:0 25px;font-size:16px;cursor:pointer;}
.button:hover{background:#084dcc;}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;margin-bottom:25px;}
.card{background:white;border-radius:22px;padding:25px;box-shadow:0 5px 20px rgba(0,0,0,0.05);}
.section{background:white;border-radius:22px;padding:25px;margin-bottom:25px;box-shadow:0 5px 20px rgba(0,0,0,0.05);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px;}
.form-grid input{width:100%;height:55px;border:none;background:#f4f7ff;border-radius:14px;padding:15px;font-size:15px;}
table{width:100%;border-collapse:collapse;}
table th,table td{padding:15px;text-align:left;border-bottom:1px solid #e5e7eb;}
table th{background:#f8fbff;color:#0a1b45;}
.status{padding:8px 14px;border-radius:30px;background:#dcfce7;color:green;font-size:13px;}
.leaderboard-item{display:flex;justify-content:space-between;padding:15px;background:#f8fbff;border-radius:14px;margin-bottom:12px;}
.rank{font-weight:700;color:#0a66ff;}

@media(max-width:900px){
.dashboard{flex-direction:column;}
.sidebar{width:100%;}
.form-grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="dashboard">

<!-- SIDEBAR -->
<div class="sidebar">
<h2>Admin Panel</h2>
<ul>
<li>Dashboard</li>
<li>Create User</li>
<li>Attendance</li>
<li>Leaderboard</li>
</ul>
</div>

<!-- MAIN -->
<div class="main-content">

<div class="topbar">
<h1>Attendance Dashboard</h1>
<button class="button">Start Session</button>
</div>

<!-- STATS -->
<div class="stats-grid">
<div class="card"><h3>Total Users</h3><h2 id="totalUsers">0</h2></div>
<div class="card"><h3>Today's Attendance</h3><h2 id="todayAttendance">0</h2></div>
</div>

<!-- CREATE USER -->
<div class="section">
<h2>Create New User</h2>

<div class="form-grid">
<input type="text" id="name" placeholder="Full Name">
<input type="text" id="phone" placeholder="Phone Number">
<input type="text" id="passcode" placeholder="Auto Generated Passcode" readonly>
<input type="text" id="department" placeholder="Department">
</div>

<button class="button" onclick="createUser()">Create User</button>
</div>

<!-- USERS TABLE -->
<div class="section">
<h2>All Created Users</h2>
<table>
<thead>
<tr>
<th>Name</th>
<th>Phone</th>
<th>Department</th>
<th>Passcode</th>
<th>Date</th>
</tr>
</thead>
<tbody id="usersTable"></tbody>
</table>
</div>

<!-- ATTENDANCE -->
<div class="section">
<h2>Attendance Records</h2>
<table>
<thead>
<tr>
<th>Name</th>
<th>Date</th>
<th>Time</th>
<th>Status</th>
</tr>
</thead>
<tbody id="attendanceTable"></tbody>
</table>
</div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCtLoXXW7Rkkja7HSBrkkcGqZsbj7kQLjw",
  authDomain: "year2-9413b.firebaseapp.com",
  databaseURL: "https://year2-9413b-default-rtdb.firebaseio.com",
  projectId: "year2-9413b"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* STORE EXISTING PASSCODES */
let existingCodes = new Set();

/* LOAD USERS REALTIME */
onValue(ref(db,'users'), (snapshot)=>{

let users = [];
let table = "";
let count = 0;

existingCodes.clear();

snapshot.forEach(child=>{
count++;
let data = child.val();

users.push(data);

/* store passcodes */
if(data.passcode){
existingCodes.add(data.passcode);
}

table += `
<tr>
<td>${data.name}</td>
<td>${data.phone}</td>
<td>${data.department || '-'}</td>
<td><b>${data.passcode}</b></td>
<td>${new Date(data.createdAt).toLocaleDateString()}</td>
</tr>
`;
});

document.getElementById('usersTable').innerHTML = table;
document.getElementById('totalUsers').innerText = count;

});

/* GENERATE UNIQUE 6-CHAR CODE */
function generatePasscode(){
const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
let code;

do{
code = "";
for(let i=0;i<6;i++){
code += chars[Math.floor(Math.random()*chars.length)];
}
}while(existingCodes.has(code));

existingCodes.add(code);
return code;
}

/* CREATE USER */
window.createUser = async function(){

const name = document.getElementById('name').value.trim();
const phone = document.getElementById('phone').value.trim();
const department = document.getElementById('department').value.trim();

if(!name || !phone){
alert("Fill required fields");
return;
}

const passcode = generatePasscode();
document.getElementById('passcode').value = passcode;

const newRef = push(ref(db,'users'));

await set(newRef,{
name,
phone,
department,
passcode,
score:0,
createdAt:Date.now()
});

alert("User created successfully");
document.getElementById('name').value='';
document.getElementById('phone').value='';
document.getElementById('department').value='';
document.getElementById('passcode').value='';

};

/* ATTENDANCE */
onValue(ref(db,'attendance'), (snapshot)=>{

let html = "";
let count = 0;

snapshot.forEach(child=>{
count++;
let d = child.val();

html += `
<tr>
<td>${d.name}</td>
<td>${d.date}</td>
<td>${d.time}</td>
<td><span class="status">${d.status}</span></td>
</tr>
`;
});

document.getElementById('attendanceTable').innerHTML = html;
document.getElementById('todayAttendance').innerText = count;

});

</script>

</body>
</html>
