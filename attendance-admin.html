<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User System</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body{
  font-family:Poppins,sans-serif;
  background:#eef4ff;
  padding:20px;
}

.container{
  max-width:900px;
  margin:auto;
}

.card{
  background:#fff;
  padding:20px;
  border-radius:16px;
  margin-bottom:20px;
  box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

input{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border:none;
  background:#f4f7ff;
  border-radius:10px;
}

button{
  padding:12px 16px;
  background:#0a66ff;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

button:hover{
  background:#084dcc;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:12px;
  border-bottom:1px solid #eee;
}

th{
  background:#f8fbff;
}

.code{
  color:#0a66ff;
  font-weight:600;
}

#toast{
  position:fixed;
  top:20px;
  right:20px;
  background:#0a66ff;
  color:white;
  padding:12px 16px;
  border-radius:10px;
  display:none;
}
</style>
</head>

<body>

<div id="toast"></div>

<div class="container">

<h2>Create User</h2>

<div class="card">

<input type="text" id="name" placeholder="Full Name">
<input type="text" id="phone" placeholder="Phone Number">
<input type="text" id="department" placeholder="Department">
<input type="text" id="passcode" placeholder="Auto Passcode" readonly>

<button onclick="createUser()">Create User</button>

</div>

<div class="card">

<h2>All Users (Alphabetical Order)</h2>

<table>
<thead>
<tr>
<th>Name</th>
<th>Phone</th>
<th>Department</th>
<th>Passcode</th>
<th>Date</th>
</tr>
</thead>

<tbody id="usersTable"></tbody>

</table>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCtLoXXW7Rkkja7HSBrkkcGqZsbj7kQLjw",
  authDomain: "year2-9413b.firebaseapp.com",
  databaseURL: "https://year2-9413b-default-rtdb.firebaseio.com",
  projectId: "year2-9413b"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

function toast(msg){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.style.display = "block";
  setTimeout(()=>t.style.display="none",2000);
}

/* UNIQUE CODE */
let codes = new Set();

function genCode(){
  const chars="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
  let code;

  do{
    code="";
    for(let i=0;i<6;i++){
      code += chars[Math.floor(Math.random()*chars.length)];
    }
  }while(codes.has(code));

  codes.add(code);
  return code;
}

/* SINGLE CLEAN RENDER FUNCTION (IMPORTANT FIX) */
function renderUsers(users){

  users.sort((a,b)=>
    (a.name || "").localeCompare(b.name || "")
  );

  let html="";

  users.forEach(u=>{
    html += `
      <tr>
        <td>${u.name || ""}</td>
        <td>${u.phone || ""}</td>
        <td>${u.department || "-"}</td>
        <td class="code">${u.passcode || ""}</td>
        <td>${new Date(u.createdAt).toLocaleString()}</td>
      </tr>
    `;
  });

  document.getElementById("usersTable").innerHTML = html;
}

/* REALTIME LISTENER (FIXED) */
let allUsers = [];

onValue(ref(db,"users"), (snap)=>{

  allUsers = [];

  codes.clear();

  snap.forEach(s=>{
    let d = s.val();
    allUsers.push(d);
    codes.add(d.passcode);
  });

  renderUsers(allUsers);

});

/* CREATE USER (FIXED FLOW) */
window.createUser = async function(){

const name = document.getElementById("name").value.trim();
const phone = document.getElementById("phone").value.trim();
const department = document.getElementById("department").value.trim();

if(!name || !phone){
toast("Fill required fields");
return;
}

const passcode = genCode();

document.getElementById("passcode").value = passcode;

await set(push(ref(db,"users")),{
name,
phone,
department,
passcode,
createdAt:Date.now()
});

/* IMPORTANT: UI refresh is automatic via onValue */
toast("User created successfully ✅");

document.getElementById("name").value="";
document.getElementById("phone").value="";
document.getElementById("department").value="";
document.getElementById("passcode").value="";

};

</script>

</body>
</html>
