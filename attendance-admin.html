<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Management System</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#eef4ff;
  padding:20px;
}

/* CONTAINER */
.container{
  max-width:1000px;
  margin:auto;
}

/* HEADER */
h1{
  margin-bottom:20px;
  color:#0a1b45;
}

/* CARD */
.card{
  background:white;
  padding:20px;
  border-radius:16px;
  box-shadow:0 5px 20px rgba(0,0,0,0.05);
  margin-bottom:20px;
}

/* FORM */
.form-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

input{
  padding:12px;
  border:none;
  background:#f4f7ff;
  border-radius:10px;
  font-size:14px;
}

/* BUTTON */
button{
  margin-top:15px;
  padding:12px 18px;
  border:none;
  border-radius:10px;
  background:#0a66ff;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#084dcc;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:12px;
  border-bottom:1px solid #eee;
  text-align:left;
}

th{
  background:#f8fbff;
  color:#0a1b45;
}

/* PASSCODE */
.code{
  font-weight:600;
  color:#0a66ff;
}

/* TOAST */
#toast{
  position:fixed;
  top:20px;
  right:20px;
  background:#0a66ff;
  color:white;
  padding:12px 16px;
  border-radius:10px;
  display:none;
}

/* MOBILE */
@media(max-width:700px){
  .form-grid{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div id="toast"></div>

<div class="container">

<h1>User Management System</h1>

<!-- CREATE USER -->
<div class="card">

<h2>Create User</h2>

<div class="form-grid">
<input type="text" id="name" placeholder="Full Name">
<input type="text" id="phone" placeholder="Phone Number">
<input type="text" id="department" placeholder="Department">
<input type="text" id="passcode" placeholder="Auto Passcode" readonly>
</div>

<button onclick="createUser()">Create User</button>

</div>

<!-- USERS LIST -->
<div class="card">

<h2>All Created Users</h2>

<table>
<thead>
<tr>
<th>Name</th>
<th>Phone</th>
<th>Department</th>
<th>Passcode</th>
<th>Date</th>
</tr>
</thead>

<tbody id="usersTable"></tbody>
</table>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyCtLoXXW7Rkkja7HSBrkkcGqZsbj7kQLjw",
  authDomain: "year2-9413b.firebaseapp.com",
  databaseURL: "https://year2-9413b-default-rtdb.firebaseio.com",
  projectId: "year2-9413b"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* TOAST */
function toast(msg){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.style.display = "block";
  setTimeout(()=>t.style.display="none",2000);
}

/* PASSCODE GENERATOR (NO DUPLICATE) */
let existingCodes = new Set();

function generatePasscode(){
  const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
  let code;

  do{
    code = "";
    for(let i=0;i<6;i++){
      code += chars[Math.floor(Math.random()*chars.length)];
    }
  }while(existingCodes.has(code));

  existingCodes.add(code);
  return code;
}

/* REAL-TIME LOAD USERS */
function loadUsers(){

  onValue(ref(db,"users"), (snapshot)=>{

    let html = "";

    existingCodes.clear();

    snapshot.forEach(child=>{

      const data = child.val();

      existingCodes.add(data.passcode);

      html += `
        <tr>
          <td>${data.name}</td>
          <td>${data.phone}</td>
          <td>${data.department || "-"}</td>
          <td class="code">${data.passcode}</td>
          <td>${new Date(data.createdAt).toLocaleString()}</td>
        </tr>
      `;
    });

    document.getElementById("usersTable").innerHTML = html;

  });

}

/* CREATE USER */
window.createUser = async function(){

const name = document.getElementById("name").value.trim();
const phone = document.getElementById("phone").value.trim();
const department = document.getElementById("department").value.trim();

if(!name || !phone){
toast("Fill all required fields");
return;
}

const passcode = generatePasscode();
document.getElementById("passcode").value = passcode;

const newUserRef = push(ref(db,"users"));

await set(newUserRef,{
name,
phone,
department,
passcode,
createdAt:Date.now()
});

toast("User created successfully ✅");

document.getElementById("name").value="";
document.getElementById("phone").value="";
document.getElementById("department").value="";
document.getElementById("passcode").value="";

};

/* INIT */
loadUsers();

</script>

</body>
</html>
