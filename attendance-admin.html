<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance Admin Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Poppins',sans-serif;
  background:#eef4ff;
  color:#111827;
}

/* LAYOUT */
.dashboard{
  display:flex;
  min-height:100vh;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:#0a1b45;
  color:white;
  padding:25px;
}

.sidebar h2{
  margin-bottom:30px;
}

.sidebar ul{
  list-style:none;
}

.sidebar ul li{
  padding:14px;
  margin-bottom:10px;
  background:rgba(255,255,255,0.08);
  border-radius:10px;
  cursor:pointer;
}

/* MAIN */
.main-content{
  flex:1;
  padding:20px;
}

.topbar{
  background:white;
  padding:20px;
  border-radius:16px;
  margin-bottom:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.button{
  background:#0a66ff;
  color:white;
  border:none;
  padding:12px 18px;
  border-radius:10px;
  cursor:pointer;
}

.button:hover{
  background:#084dcc;
}

/* CARDS */
.stats-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
  margin-bottom:20px;
}

.card{
  background:white;
  padding:20px;
  border-radius:16px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

/* SECTIONS */
.section{
  background:white;
  padding:20px;
  border-radius:16px;
  margin-bottom:20px;
}

/* FORM */
.form-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

input{
  padding:12px;
  border:none;
  background:#f4f7ff;
  border-radius:10px;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:12px;
  border-bottom:1px solid #eee;
  text-align:left;
}

th{
  background:#f8fbff;
}

/* TOAST */
#toast{
  position:fixed;
  top:20px;
  right:20px;
  background:#0a66ff;
  color:white;
  padding:12px 18px;
  border-radius:10px;
  display:none;
  z-index:9999;
}

/* MOBILE */
@media(max-width:900px){
  .dashboard{
    flex-direction:column;
  }

  .sidebar{
    width:100%;
  }

  .form-grid{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div id="toast"></div>

<div class="dashboard">

<!-- SIDEBAR -->
<div class="sidebar">
<h2>Admin Panel</h2>
<ul>
<li>Dashboard</li>
<li>Create User</li>
<li>Attendance</li>
<li>Reports</li>
</ul>
</div>

<!-- MAIN -->
<div class="main-content">

<div class="topbar">
<h1>Attendance Dashboard</h1>
<button class="button">Start Session</button>
</div>

<!-- STATS -->
<div class="stats-grid">
<div class="card">
<h3>Total Users</h3>
<h2 id="totalUsers">0</h2>
</div>

<div class="card">
<h3>Attendance</h3>
<h2 id="totalAttendance">0</h2>
</div>
</div>

<!-- CREATE USER -->
<div class="section">
<h2>Create User</h2>

<div class="form-grid">
<input type="text" id="name" placeholder="Full Name">
<input type="text" id="phone" placeholder="Phone Number">
<input type="text" id="department" placeholder="Department">
<input type="text" id="passcode" placeholder="Auto Passcode" readonly>
</div>

<br>
<button class="button" onclick="createUser()">Create User</button>
</div>

<!-- USERS -->
<div class="section">
<h2>All Users</h2>

<table>
<thead>
<tr>
<th>Name</th>
<th>Phone</th>
<th>Department</th>
<th>Passcode</th>
<th>Date</th>
</tr>
</thead>
<tbody id="usersTable"></tbody>
</table>
</div>

<!-- ATTENDANCE -->
<div class="section">
<h2>Attendance Records</h2>

<table>
<thead>
<tr>
<th>Name</th>
<th>Date</th>
<th>Time</th>
<th>Status</th>
</tr>
</thead>
<tbody id="attendanceTable"></tbody>
</table>
</div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyCtLoXXW7Rkkja7HSBrkkcGqZsbj7kQLjw",
  authDomain: "year2-9413b.firebaseapp.com",
  databaseURL: "https://year2-9413b-default-rtdb.firebaseio.com",
  projectId: "year2-9413b"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* TOAST */
function toast(msg,color="#0a66ff"){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.style.background = color;
  t.style.display = "block";
  setTimeout(()=>t.style.display="none",2500);
}

/* PASSCODE SYSTEM */
let codes = new Set();

function generateCode(){
  const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
  let code;

  do{
    code = "";
    for(let i=0;i<6;i++){
      code += chars[Math.floor(Math.random()*chars.length)];
    }
  }while(codes.has(code));

  codes.add(code);
  return code;
}

/* LOAD FROM FIREBASE (REAL SOURCE OF TRUTH) */
function loadData(){

onValue(ref(db,"users"), (snap)=>{

let html = "";
let count = 0;

codes.clear();

snap.forEach(s=>{
count++;
let d = s.val();

codes.add(d.passcode);

html += `
<tr>
<td>${d.name}</td>
<td>${d.phone}</td>
<td>${d.department || "-"}</td>
<td><b>${d.passcode}</b></td>
<td>${new Date(d.createdAt).toLocaleString()}</td>
</tr>
`;
});

document.getElementById("usersTable").innerHTML = html;
document.getElementById("totalUsers").innerText = count;

});

onValue(ref(db,"attendance"), (snap)=>{

let html = "";
let count = 0;

snap.forEach(s=>{
count++;
let d = s.val();

html += `
<tr>
<td>${d.name}</td>
<td>${d.date}</td>
<td>${d.time}</td>
<td>${d.status}</td>
</tr>
`;
});

document.getElementById("attendanceTable").innerHTML = html;
document.getElementById("totalAttendance").innerText = count;

});

}

/* CREATE USER */
window.createUser = async function(){

const name = document.getElementById("name").value.trim();
const phone = document.getElementById("phone").value.trim();
const department = document.getElementById("department").value.trim();

if(!name || !phone){
toast("Fill required fields","red");
return;
}

const passcode = generateCode();
document.getElementById("passcode").value = passcode;

const refUser = push(ref(db,"users"));

await set(refUser,{
name,
phone,
department,
passcode,
score:0,
createdAt:Date.now()
});

toast("User created successfully ✅");

document.getElementById("name").value="";
document.getElementById("phone").value="";
document.getElementById("department").value="";
document.getElementById("passcode").value="";

};

/* INIT */
loadData();

</script>

</body>
</html>
