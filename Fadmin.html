<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Association Admin</title>

<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f4f6f9;
  }

  header {
    background: #2c3e50;
    color: white;
    padding: 15px;
    text-align: center;
  }

  header img {
    max-width: 80px;
    display: block;
    margin: 0 auto 10px;
  }

  .container {
    padding: 15px;
    max-width: 900px;
    margin: auto;
  }

  form {
    background: white;
    padding: 15px;
    border-radius: 8px;
    margin-bottom: 20px;
  }

  input {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
    border-radius: 5px;
    border: 1px solid #ccc;
  }

  button {
    width: 100%;
    padding: 12px;
    background: #27ae60;
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 16px;
  }

  .search-box {
    margin-bottom: 15px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    background: white;
  }

  th, td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
    text-align: left;
  }

  /* Mobile cards */
  @media (max-width: 600px) {
    table, thead, tbody, th, td, tr {
      display: block;
    }

    tr {
      margin-bottom: 10px;
      background: white;
      border-radius: 8px;
      padding: 10px;
    }

    td {
      border: none;
      padding: 5px 0;
    }

    th {
      display: none;
    }
  }
</style>
</head>

<body>

<header>
  <!-- Replace with your logo -->
  <img src="https://via.placeholder.com/80" alt="Logo">
  <h2>Association Admin Panel</h2>
</header>

<div class="container">

  <form id="userForm">
    <input type="text" id="name" placeholder="Full Name" required>
    <input type="text" id="phone" placeholder="Phone Number" required>
    <input type="email" id="email" placeholder="Email Address" required>
    <input type="text" id="address" placeholder="Contact Address" required>
    <input type="text" id="membership" placeholder="Membership Type" required>
    <button type="submit">Create Member</button>
  </form>

  <input type="text" id="search" class="search-box" placeholder="Search by name, phone or address">

  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Phone</th>
        <th>Email</th>
        <th>Address</th>
        <th>Membership</th>
        <th>Passcode</th>
      </tr>
    </thead>
    <tbody id="userTable"></tbody>
  </table>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = {
          apiKey: "AIzaSyBA_gGITL3vOX_wymV8m3c7h_2kYxUEL0A",
          authDomain: "email-5e336.firebaseapp.com",
          projectId: "email-5e336",
          storageBucket: "email-5e336.appspot.com",
          messagingSenderId: "561655323170",
          appId: "1:561655323170:web:42fcf886c34f2d5a16487b",
          measurementId: "G-J92WNBY5RL"
       };

firebase.initializeApp(firebaseConfig);
const db = firebase.database().ref("users");

// Generate 6-character uppercase alphanumeric passcode
function generatePasscode() {
  const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
  let code = "";
  for (let i = 0; i < 6; i++) {
    code += chars.charAt(Math.floor(Math.random() * chars.length));
  }
  return code;
}

// Add user
document.getElementById("userForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const user = {
    name: name.value,
    phone: phone.value,
    email: email.value,
    address: address.value,
    membership: membership.value,
    passcode: generatePasscode()
  };

  db.push(user);

  alert("User created successfully!");

  this.reset();
});

// Display users
db.on("value", snapshot => {
  const data = snapshot.val();
  renderTable(data);
});

function renderTable(data) {
  const table = document.getElementById("userTable");
  table.innerHTML = "";

  for (let id in data) {
    const user = data[id];

    const row = `
      <tr>
        <td>${user.name}</td>
        <td>${user.phone}</td>
        <td>${user.email}</td>
        <td>${user.address}</td>
        <td>${user.membership}</td>
        <td>${user.passcode}</td>
      </tr>
    `;
    table.innerHTML += row;
  }
}

// Search filter
document.getElementById("search").addEventListener("input", function() {
  const value = this.value.toLowerCase();
  const rows = document.querySelectorAll("#userTable tr");

  rows.forEach(row => {
    const text = row.innerText.toLowerCase();
    row.style.display = text.includes(value) ? "" : "none";
  });
});
</script>

</body>
</html>
