<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Attendance Report</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
:root{
  --bg:#0b1220;
  --card:#111a2e;
  --primary:#2563eb;
  --accent:#0ea5e9;
  --text:#e2e8f0;
  --muted:#94a3b8;
}

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
header{
  padding:18px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
  background:linear-gradient(135deg,var(--primary),var(--accent));
}

/* TOGGLE BAR */
.toggle-bar{
  display:flex;
  justify-content:center;
  gap:10px;
  padding:15px;
  flex-wrap:wrap;
}

.toggle-btn{
  padding:10px 16px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#1e293b;
  color:var(--text);
  transition:.3s;
  font-weight:bold;
}

.toggle-btn.active{
  background:var(--primary);
}

/* CONTAINER */
.container{
  max-width:1100px;
  margin:auto;
  padding:15px;
}

/* CARD */
.card{
  background:var(--card);
  padding:15px;
  border-radius:14px;
  margin-bottom:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

/* INPUT */
input{
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:8px;
  outline:none;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
  overflow:hidden;
}

th,td{
  padding:10px;
  font-size:14px;
}

th{
  background:var(--primary);
  text-align:left;
}

tr:nth-child(even){
  background:#1f2a44;
}

/* HIDE SECTION */
.hidden{
  display:none;
}

/* HOVER EFFECT */
tr:hover{
  background:#2b3a5c;
  cursor:pointer;
}

/* MOBILE */
@media(max-width:600px){
  th,td{font-size:12px;}
}
</style>
</head>

<body>

<header>📊 Smart Attendance Dashboard</header>

<!-- TOGGLE -->
<div class="toggle-bar">
  <button class="toggle-btn active" onclick="switchTab('users')">👥 Users</button>
  <button class="toggle-btn" onclick="switchTab('attendance')">📅 Attendance</button>
</div>

<div class="container">

<!-- USERS SECTION -->
<div id="usersSection" class="card">

  <h3>Registered Users</h3>

  <input type="text" id="nameFilter" placeholder="Search Name" oninput="filterUser()">
  <input type="text" id="phoneFilter" placeholder="Search Phone" oninput="filterUser()">
  <input type="text" id="addressFilter" placeholder="Search Address" oninput="filterUser()">

  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Phone</th>
        <th>Address</th>
      </tr>
    </thead>
    <tbody id="userList"></tbody>
  </table>
</div>

<!-- ATTENDANCE SECTION -->
<div id="attendanceSection" class="card hidden">

  <h3>Attendance Records</h3>

  <input type="date" id="dateFilter" onchange="loadByDate()">

  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Date</th>
        <th>Time</th>
      </tr>
    </thead>
    <tbody id="history"></tbody>
  </table>

</div>

</div>

<script>

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyBA_gGITL3vOX_wymV8m3c7h_2kYxUEL0A",
  authDomain: "email-5e336.firebaseapp.com",
  projectId: "email-5e336",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let allUsers = {};
let allAttendance = {};

/* TOGGLE FUNCTION */
function switchTab(tab){

  document.querySelectorAll('.toggle-btn').forEach(b=>b.classList.remove('active'));

  if(tab === 'users'){
    document.getElementById("usersSection").classList.remove("hidden");
    document.getElementById("attendanceSection").classList.add("hidden");
    document.querySelectorAll('.toggle-btn')[0].classList.add('active');
  }

  if(tab === 'attendance'){
    document.getElementById("attendanceSection").classList.remove("hidden");
    document.getElementById("usersSection").classList.add("hidden");
    document.querySelectorAll('.toggle-btn')[1].classList.add('active');
  }
}

/* INIT DATA */
function init(){
  db.ref("users").once("value", u=>{
    db.ref("attendance").once("value", a=>{

      u.forEach(x=>{
        allUsers[x.key] = x.val();
      });

      a.forEach(x=>{
        allAttendance[x.key] = x.val();
      });

      renderUsers(allUsers);
    });
  });
}

/* RENDER USERS */
function renderUsers(users){
  const table = document.getElementById("userList");
  table.innerHTML = "";

  Object.entries(users).forEach(([id,u])=>{
    table.innerHTML += `
      <tr onclick="showUserHistory('${id}')">
        <td>${u.name}</td>
        <td>${u.phone}</td>
        <td>${u.address}</td>
      </tr>
    `;
  });
}

/* FILTER USERS */
function filterUser(){
  const name = nameFilter.value.toLowerCase();
  const phone = phoneFilter.value.toLowerCase();
  const address = addressFilter.value.toLowerCase();

  let filtered = {};

  Object.entries(allUsers).forEach(([id,u])=>{
    if(
      u.name.toLowerCase().includes(name) &&
      u.phone.toLowerCase().includes(phone) &&
      u.address.toLowerCase().includes(address)
    ){
      filtered[id] = u;
    }
  });

  renderUsers(filtered);
}

/* USER HISTORY */
function showUserHistory(userId){
  const table = document.getElementById("history");
  table.innerHTML = "";

  let found = false;

  Object.entries(allAttendance).forEach(([date, users])=>{
    if(users[userId]){
      found = true;
      const d = users[userId];

      table.innerHTML += `
        <tr>
          <td>${d.name}</td>
          <td>${date}</td>
          <td>${d.time}</td>
        </tr>
      `;
    }
  });

  if(!found){
    table.innerHTML = "<tr><td colspan='3'>No records</td></tr>";
  }

  switchTab('attendance');
}

/* DATE FILTER */
function loadByDate(){
  const raw = document.getElementById("dateFilter").value;
  const table = document.getElementById("history");

  table.innerHTML = "";

  if(!raw){
    table.innerHTML = "<tr><td colspan='3'>Select a date</td></tr>";
    return;
  }

  const key = raw.split("-")[0] + "-" +
              parseInt(raw.split("-")[1]) + "-" +
              parseInt(raw.split("-")[2]);

  if(!allAttendance[key]){
    table.innerHTML = "<tr><td colspan='3'>No attendance</td></tr>";
    return;
  }

  Object.values(allAttendance[key]).forEach(d=>{
    table.innerHTML += `
      <tr>
        <td>${d.name}</td>
        <td>${key}</td>
        <td>${d.time}</td>
      </tr>
    `;
  });
}

init();

</script>

</body>
</html>
