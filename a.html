<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance Check-In</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
:root{
  --primary:#2563eb;
  --accent:#0ea5e9;
  --bg:#0f172a;
  --card:#1e293b;
  --text:#e2e8f0;
  --success:#22c55e;
  --error:#ef4444;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
  background:linear-gradient(135deg,#020617,#0f172a);
  color:var(--text);
  display:flex;
  flex-direction:column;
  min-height:100vh;
}

/* Header */
header{
  padding:16px;
  text-align:center;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  font-weight:bold;
}

/* Container */
.container{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:16px;
}

/* Card */
.card{
  width:100%;
  max-width:400px;
  background:rgba(30,41,59,0.8);
  backdrop-filter:blur(10px);
  padding:25px;
  border-radius:16px;
  box-shadow:0 0 30px rgba(14,165,233,0.2);
  text-align:center;
  animation:fadeIn .6s ease;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}

.instructions{
  font-size:14px;
  margin-bottom:15px;
  line-height:1.5;
}

/* Input */
input{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  margin:10px 0;
  text-align:center;
  font-size:20px;
  letter-spacing:4px;
}

/* Button */
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:var(--primary);
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:.3s;
}

button:hover{
  background:var(--accent);
  transform:scale(1.03);
}

/* Modal */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  display:flex;
  justify-content:center;
  align-items:center;
  visibility:hidden;
  opacity:0;
  transition:.3s;
}

.modal.show{
  visibility:visible;
  opacity:1;
}

.modal-content{
  background:var(--card);
  padding:25px;
  border-radius:16px;
  text-align:center;
  max-width:300px;
  animation:pop .4s ease;
}

@keyframes pop{
  from{transform:scale(0.7);}
  to{transform:scale(1);}
}

.success{color:var(--success);}
.error{color:var(--error);}
</style>
</head>

<body>

<header>✅ Attendance Check-In</header>

<div class="container">
  <div class="card">

    <h2>Enter Passcode</h2>

    <div class="instructions">
      Enter your 6-digit passcode and tap check-in.<br>
      Your attendance will be recorded instantly.
    </div>

    <input type="text" id="passcode" maxlength="6" placeholder="******">

    <button onclick="markAttendance()">Check-In</button>

  </div>
</div>

<!-- Modal -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h3 id="modalText"></h3>
  </div>
</div>

<script>
// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyBA_gGITL3vOX_wymV8m3c7h_2kYxUEL0A",
  authDomain: "email-5e336.firebaseapp.com",
  projectId: "email-5e336",
  storageBucket: "email-5e336.appspot.com",
  messagingSenderId: "561655323170",
  appId: "1:561655323170:web:42fcf886c34f2d5a16487b"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* Date Key */
function getTodayKey(){
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
}

/* Speech */
function speak(text){
  const speech = new SpeechSynthesisUtterance(text);
  speech.rate = 0.9;
  speech.pitch = 1;
  speech.lang = "en-US";
  speechSynthesis.speak(speech);
}

/* Show Modal */
function showModal(text, type="success"){
  const modal = document.getElementById("modal");
  const modalText = document.getElementById("modalText");

  modalText.innerHTML = text;
  modalText.className = type;

  modal.classList.add("show");

  setTimeout(()=>{
    modal.classList.remove("show");
  },4000);
}

/* Mark Attendance */
function markAttendance(){
  const passcode = document.getElementById("passcode").value.trim().toUpperCase();

  if(passcode.length !== 6){
    showModal("❌ Invalid passcode", "error");
    return;
  }

  db.ref("users").once("value", snapshot=>{
    let foundUser=null, userId=null;

    snapshot.forEach(child=>{
      if(child.val().passcode === passcode){
        foundUser = child.val();
        userId = child.key;
      }
    });

    if(!foundUser){
      showModal("❌ Passcode not found", "error");
      speak("Invalid passcode");
      return;
    }

    const todayKey = getTodayKey();
    const now = new Date();

    const attendanceRef = db.ref("attendance/" + todayKey + "/" + userId);

    attendanceRef.once("value", snap=>{
      if(snap.exists()){
        showModal("⚠️ Already marked today", "error");
        speak(foundUser.name + ", your attendance has already been recorded today.");
      } else {

        attendanceRef.set({
          name: foundUser.name,
          passcode: passcode,
          time: now.toLocaleTimeString(),
          date: now.toDateString(),
          timestamp: Date.now()
        });

        const message = `Welcome ${foundUser.name}! Attendance recorded at ${now.toLocaleTimeString()}`;

        showModal("✅ " + message, "success");

        speak(`Welcome ${foundUser.name}. Your attendance has been recorded at ${now.toLocaleTimeString()}. Keep up the good work.`);

        document.getElementById("passcode").value="";
      }
    });

  });
}
</script>

</body>
</html>
